[build]
  # Directory that contains the package.json
  base = "."
  
  # Build command
  command = "npm run build"
  
  # Directory that contains the built files
  publish = "build"

[build.environment]
  NODE_VERSION = "18"

[[redirects]]
  # Handle client-side routing
  from = "/*"
  to = "/index.html"
  status = 200
