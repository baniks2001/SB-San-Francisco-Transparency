# Redis configuration for session storage and caching

# Network settings
bind 0.0.0.0
port 6379
protected-mode yes

# Security
requirepass ${REDIS_PASSWORD}

# Memory management
maxmemory 256mb
maxmemory-policy allkeys-lru

# Persistence
save 900 1
save 300 10
save 60 10000

# Append only file
appendonly yes
appendfsync everysec

# Logging
loglevel notice
logfile /var/log/redis/redis-server.log

# Performance
tcp-keepalive 300
timeout 0

# Databases
databases 16

# Session storage settings
# Database 0: User sessions
# Database 1: API cache
# Database 2: CDN cache
# Database 3: Rate limiting

# Slow log
slowlog-log-slower-than 10000
slowlog-max-len 128
